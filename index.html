<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>迷遥 · 音乐网站</title>

<style>
:root {
  --bg:#000;
  --panel:#111;
  --panel-2:#181818;
  --text:#f1d3a1;
  --muted:#c8a97b;
  --accent:#f07a1a;
  --line:rgba(241,211,161,0.16);
}

body{
  margin:0;
  padding:24px 16px;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}

.container{max-width:860px;margin:0 auto;}

.logo-wrap{text-align:center;margin-bottom:28px;}
.logo{width:140px;margin-bottom:12px;}
.title{font-size:28px;font-weight:700;}
.subtitle{color:var(--muted);font-size:13px;}

.filter{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:20px 0;
}

.filter button{
  background:transparent;
  border:1px solid var(--accent);
  color:var(--accent);
  padding:6px 12px;
  border-radius:999px;
  cursor:pointer;
}

.filter button.active{
  background:var(--accent);
  color:#000;
}

.song{
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
}

.song-title{font-weight:700;margin-bottom:6px;}
.song-desc{color:var(--muted);font-size:13px;margin-bottom:8px;}

audio{width:100%;margin:6px 0;}

.lyric-btn{
  border:1px solid var(--accent);
  color:var(--accent);
  background:transparent;
  padding:5px 10px;
  border-radius:999px;
  cursor:pointer;
}

.lyrics{
  display:none;
  margin-top:10px;
  border-top:1px solid var(--line);
  padding-top:10px;
  white-space:pre-line;
  color:var(--muted);
}

.footer{text-align:center;margin-top:40px;font-size:12px;color:#888;}
</style>
</head>

<body>
<div class="container">

<div class="header-mini">
  <img src="logo.png" class="header-logo">
  <div class="header-text">
    <div class="brand">迷遥</div>
    <div class="meta">
      <span>词曲作者：老湛</span>
      <span>编曲 / 演唱：Suno AI</span>
    </div>
    <div class="contact">
      <span>微信：maitianjiao</span>
      <span>邮箱：yimin.zhan8@gmail.com</span>
    </div>
  </div>
</div>

<!-- 分类按钮 -->
<div class="filter" id="filter"></div>

<!-- 歌单 -->
<div id="song-list"></div>

<div class="footer">迷遥 · 音乐目录</div>

</div>

<script>
let allSongs = [];
let currentCategory = "全部";
let loadedLyrics = {}; // 缓存歌词

// 加载歌曲数据
fetch("data/songs.json")
.then(res=>res.json())
.then(data=>{
  allSongs = data;
  initCategories();
  renderSongs();
});

// 分类按钮
function initCategories(){
  const categories = ["全部", ...new Set(allSongs.map(s=>s.category))];
  const filter = document.getElementById("filter");

  categories.forEach(cat=>{
    const btn = document.createElement("button");
    btn.textContent = cat;
    if(cat==="全部") btn.classList.add("active");

    btn.onclick=()=>{
      currentCategory = cat;
      document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      renderSongs();
    };

    filter.appendChild(btn);
  });
}

// 渲染歌曲
function renderSongs(){
  const list = document.getElementById("song-list");
  list.innerHTML = "";

  const songs = currentCategory==="全部"
    ? allSongs
    : allSongs.filter(s=>s.category===currentCategory);

  songs.forEach(song=>{
    const div = document.createElement("div");
    div.className="song";

    div.innerHTML = `
      <div class="song-title">${song.title}</div>
      ${song.desc ? `<div class="song-desc">${song.desc}</div>` : ""}
      <audio controls preload="none">
        <source src="${song.audio}" type="audio/mpeg">
      </audio>
      <button class="lyric-btn">查看歌词</button>
      <div class="lyrics"></div>
    `;

    const btn = div.querySelector(".lyric-btn");
    const lyricsDiv = div.querySelector(".lyrics");
    const audio = div.querySelector("audio");

    // 播放器互斥
    audio.addEventListener("play",()=>{
      document.querySelectorAll("audio").forEach(a=>{
        if(a!==audio){a.pause();a.currentTime=0;}
      });
    });

    // 点击歌词
    btn.onclick = async ()=>{
      const isOpen = lyricsDiv.style.display==="block";

      document.querySelectorAll(".lyrics").forEach(l=>l.style.display="none");
      document.querySelectorAll(".lyric-btn").forEach(b=>b.textContent="查看歌词");

      if(!isOpen){
        lyricsDiv.style.display="block";
        btn.textContent="收起歌词";

        if(!loadedLyrics[song.lyrics]){
          lyricsDiv.textContent = "加载中...";
          const res = await fetch(song.lyrics);
          const text = await res.text();
          loadedLyrics[song.lyrics] = text;
        }

        lyricsDiv.textContent = loadedLyrics[song.lyrics];
      }
    };

    list.appendChild(div);
  });
}
</script>

</body>
</html>
