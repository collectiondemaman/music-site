<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>迷遥 · 音乐网站</title>

  <style>
    :root {
      --bg: #000000;
      --panel: #111111;
      --panel-2: #181818;
      --text: #f1d3a1;
      --muted: #c8a97b;
      --accent: #f07a1a;
      --line: rgba(241, 211, 161, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px 48px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    .header-mini {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      padding: 4px 0 2px;
    }

    .header-logo {
      width: 56px;
      height: auto;
      flex-shrink: 0;
      display: block;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .brand {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 6px;
      color: var(--text);
    }

    .meta,
    .contact {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .meta span,
    .contact span {
      white-space: nowrap;
    }

    .filter {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 18px 0 22px;
    }

    .filter button {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    .filter button:hover {
      background: rgba(240, 122, 26, 0.08);
    }

    .filter button.active {
      background: var(--accent);
      color: #000;
    }

    .song {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .song-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .song-desc {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.6;
    }

    audio {
      width: 100%;
      margin-top: 4px;
      margin-bottom: 10px;
    }

    .lyric-btn {
      display: inline-block;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    .lyric-btn:hover {
      background: rgba(240, 122, 26, 0.08);
    }

    .lyrics {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      white-space: pre-line;
      line-height: 1.8;
      font-size: 14px;
      color: var(--muted);
    }

    .footer {
      text-align: center;
      color: rgba(241, 211, 161, 0.55);
      font-size: 12px;
      margin-top: 36px;
    }

    .empty-tip {
      color: var(--muted);
      font-size: 14px;
      padding: 18px 0;
    }

    @media (max-width: 640px) {
      body {
        padding: 18px 12px 40px;
      }

      .header-mini {
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 18px;
      }

      .header-logo {
        width: 48px;
      }

      .brand {
        font-size: 24px;
        margin-bottom: 4px;
      }

      .meta,
      .contact {
        font-size: 12px;
        gap: 4px 10px;
      }

      .meta span,
      .contact span {
        white-space: normal;
      }

      .song-title {
        font-size: 17px;
      }

      .lyrics {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header-mini">
      <img src="logo.png" alt="迷遥 Logo" class="header-logo">
      <div class="header-text">
        <div class="brand">迷遥</div>
        <div class="meta">
          <span>词曲作者：老湛</span>
          <span>编曲 / 演唱：Suno AI</span>
        </div>
        <div class="contact">
          <span>微信：maitianjiao</span>
          <span>邮箱：yimin.zhan8@gmail.com</span>
        </div>
      </div>
    </div>

    <div class="filter" id="filter"></div>

    <div id="song-list"></div>

    <div class="footer">迷遥 · 音乐目录</div>
  </div>

  <script>
    let allSongs = [];
    let currentCategory = "全部";
    const loadedLyrics = {};

    fetch("data/songs.json")
      .then(res => {
        if (!res.ok) {
          throw new Error("songs.json 加载失败");
        }
        return res.json();
      })
      .then(data => {
        allSongs = data;
        initCategories();
        renderSongs();
      })
      .catch(err => {
        document.getElementById("song-list").innerHTML =
          '<div class="empty-tip">歌曲数据加载失败，请检查 data/songs.json 路径或格式。</div>';
        console.error(err);
      });

    function initCategories() {
      const categories = ["全部", ...new Set(allSongs.map(song => song.category))];
      const filter = document.getElementById("filter");
      filter.innerHTML = "";

      categories.forEach(category => {
        const btn = document.createElement("button");
        btn.textContent = category;

        if (category === "全部") {
          btn.classList.add("active");
        }

        btn.addEventListener("click", () => {
          currentCategory = category;
          document.querySelectorAll(".filter button").forEach(button => {
            button.classList.remove("active");
          });
          btn.classList.add("active");
          renderSongs();
        });

        filter.appendChild(btn);
      });
    }

    function renderSongs() {
      const list = document.getElementById("song-list");
      list.innerHTML = "";

      const songsToRender = currentCategory === "全部"
        ? allSongs
        : allSongs.filter(song => song.category === currentCategory);

      if (!songsToRender.length) {
        list.innerHTML = '<div class="empty-tip">这个分类下暂时还没有歌曲。</div>';
        return;
      }

      songsToRender.forEach(song => {
        const card = document.createElement("div");
        card.className = "song";

        card.innerHTML = `
          <div class="song-title">${escapeHtml(song.title || "")}</div>
          ${song.desc ? `<div class="song-desc">${escapeHtml(song.desc)}</div>` : ""}
          <audio controls preload="none">
            <source src="${song.audio}" type="audio/mpeg">
            你的浏览器不支持音频播放。
          </audio>
          <button class="lyric-btn" type="button">查看歌词</button>
          <div class="lyrics"></div>
        `;

        const audio = card.querySelector("audio");
        const lyricBtn = card.querySelector(".lyric-btn");
        const lyricsBox = card.querySelector(".lyrics");

        audio.addEventListener("play", () => {
          document.querySelectorAll("audio").forEach(other => {
            if (other !== audio) {
              other.pause();
              other.currentTime = 0;
            }
          });
        });

        lyricBtn.addEventListener("click", async () => {
          const isOpen = lyricsBox.style.display === "block";

          document.querySelectorAll(".lyrics").forEach(box => {
            box.style.display = "none";
          });

          document.querySelectorAll(".lyric-btn").forEach(btn => {
            btn.textContent = "查看歌词";
          });

          if (!isOpen) {
            lyricsBox.style.display = "block";
            lyricBtn.textContent = "收起歌词";

            if (!loadedLyrics[song.lyrics]) {
              lyricsBox.textContent = "加载中...";
              try {
                const response = await fetch(song.lyrics);
                if (!response.ok) {
                  throw new Error("歌词加载失败");
                }
                const text = await response.text();
                loadedLyrics[song.lyrics] = text;
              } catch (error) {
                loadedLyrics[song.lyrics] = "歌词加载失败，请检查 lyrics 文件路径。";
                console.error(error);
              }
            }

            lyricsBox.textContent = loadedLyrics[song.lyrics];
          }
        });

        list.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
